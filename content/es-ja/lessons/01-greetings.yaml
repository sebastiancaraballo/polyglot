id: greetings
title: "Saludos básicos"
jlpt: N5
cards:
  - es: "Hola / Buenas tardes"
    jp: "こんにちは"
    romaji: "konnichiwa"
    notes: "Saludo general durante el día."
  - es: "Buenos días"
    jp: "おはよう"
    romaji: "ohayō"
    notes: |-
      Pronunciación: ohayō.
      Entrada kana: ohayou.
      Cortés: おはようございます.
      Cortés (pronunciación): ohayō gozaimasu.
      Cortés (entrada kana): ohayou gozaimasu.
  - es: "Buenas noches (saludo)"
    jp: "こんばんは"
    romaji: "konbanwa"
  - es: "Gracias"
    jp: "ありがとう"
    romaji: "arigatō"
    notes: |-
      Pronunciación: arigatō.
      Entrada kana: arigatou.
      Cortés: ありがとうございます.
      Cortés (pronunciación): arigatō gozaimasu.
      Cortés (entrada kana): arigatou gozaimasu.
  - es: "Adiós"
    jp: "さようなら"
    romaji: "sayōnara"
    notes: "Pronunciación: sayōnara. Entrada kana: sayounara."
  - es: "Sí"
    jp: "はい"
    romaji: "hai"
  - es: "No"
    jp: "いいえ"
    romaji: "iie"
  - es: "Por favor"
    jp: "おねがいします"
    romaji: "onegaishimasu"
